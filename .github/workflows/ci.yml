name: CI

# The test suite and the non-vacuity harness, on every push and every pull request.
#
# WHY THIS FILE EXISTS. Until it did, `release.yml` was the only workflow in the repo, and it runs
# only on a published GitHub Release. `scripts/non-vacuity.py` -- 112 mutation cases that revert
# each protection in the source and require its guarding test to FAIL -- was invoked by nothing.
# Not on push, not on PR, not on release. The v0.10.1 release log does contain a line reading
# `NVCOUNT tests=293 failed=0 skipped=1`, which looks like harness output but is not: `NVCOUNT` is
# printed unconditionally from the test task's `doLast`, so that line is the ORDINARY full-suite
# run announcing itself. Zero mutations were exercised in CI, ever. The "104/104 mutations caught"
# figure in CHANGELOG.md came from a human running the script by hand on a laptop.
#
# A gate that nothing invokes protects exactly as much as a gate that is broken. This wires it up.

on:
  push:
  pull_request:
  schedule:
    # Daily, 03:17 UTC. Off the hour deliberately -- GitHub drops scheduled runs at peak minutes.
    - cron: '17 3 * * *'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── FAST PATH ────────────────────────────────────────────────────────────────────────────────
  # Runs on every push and PR. `build` includes `check`, which includes `checkDarajaCatalog`.
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # The Daraja drift guard needs NOTHING checked out beside this repo. It verifies the
      # vendored catalog against `daraja-catalog.sha256`, a committed pin. This job used to also
      # clone the private monorepo with an MPESA_REPO_TOKEN secret so the guard had something to
      # compare against; that checkout, that secret, and the step that reported whether the guard
      # had run at all are all gone. See build.gradle.kts for why a pinned digest was preferred
      # over a long-lived cross-repo credential stored in a public repo.
      - name: Build and test
        run: ./gradlew build --console=plain --no-daemon

  # ── FULL SWEEP ───────────────────────────────────────────────────────────────────────────────
  # 112 mutation cases, each a clean run plus a mutated run, every one forced through
  # `--rerun-tasks` to defeat Gradle's build cache. That is 224 uncached Gradle test invocations.
  #
  # MEASURED: 11m27s wall (4m05s user) for 112/112 CAUGHT on a warm local checkout. A GitHub-hosted
  # 2-core runner starting cold should be taken as roughly 2x that, so budget 20-30 minutes; the
  # job's timeout-minutes is set well above that so a slow runner reports a real result rather than
  # a timeout that reads like a failure.
  #
  # So it runs on pull_request -- nothing merges uncertified -- and on a daily schedule, so a
  # direct push to a branch surfaces within a day. It does NOT run on every push, where 20-30
  # minutes per commit would buy little over the `test` job above. The publish path is covered
  # separately and unconditionally: release.yml runs the same sweep before it builds or signs.
  # Between the three, every route by which code reaches a user passes through this harness.
  non-vacuity:
    name: Non-vacuity sweep (112 mutations)
    # Runs on push too, not only PR and schedule.
    #
    # The sweep costs roughly 25 minutes on a hosted runner against 11 locally, and skipping it on
    # push was a defensible trade. It is not the trade this repository should make, because of how
    # the skip RENDERS: the job appears in a green run with the word "skipped" beside it, which is
    # visually indistinguishable from a gate that ran and passed.
    #
    # That exact confusion is what this repository spent a day undoing. The Node harness reported
    # 0/121 on every release for its entire life; a NUL byte made a source file invisible to grep;
    # four catalog drift guards were green because the file they compare against was absent. Every
    # one of them was a check that ran, reported nothing, and looked fine. A skipped gate is the
    # same failure wearing a checkmark.
    #
    # This repository takes few pushes. Twenty-five minutes is a cheap price for never having to
    # ask whether a green tick meant the sweep ran.
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # Case R11-catalog-drift reverts the vendored catalog to pre-fix wording and requires
      # `DarajaCatalogDriftTest` to fail. That test used to `assumeTrue` the private monorepo was
      # checked out beside this repo, so without it the guard SKIPPED and the harness classified
      # the case as BROKEN-SELECTOR -- which is why this job used to clone the monorepo with an
      # MPESA_REPO_TOKEN secret and hard-fail without it. The guard now verifies against the
      # committed `daraja-catalog.sha256` pin instead, so the case is certifiable from this
      # checkout alone and the credential is no longer needed anywhere.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # No `continue-on-error`, no `|| true`, no pipe: the harness's own exit status IS the gate.
      # It exits 1 when any case is not CAUGHT (VACUOUS, BROKEN-SELECTOR, BROKEN-ANCHOR,
      # BROKEN-BUILD, BROKEN-MUTATION) and 2 on a sweep that measured nothing -- an unregistered
      # `nv-` tag, a case naming a tag no test carries, or an empty result set. Both are non-zero,
      # so both fail the step and the job. A pipe through `tee` would mask them behind tee's
      # status, which is why there isn't one.
      - name: Non-vacuity sweep
        run: python3 scripts/non-vacuity.py

      # The harness mutates source in place and restores it in a `finally`. If the tree is dirty
      # afterwards, that restore did not hold -- worth knowing before a later job builds from it.
      - name: Verify the harness restored the working tree
        if: always()
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::The working tree is dirty after the sweep; the harness's restore guard did not hold." >&2
            git status --porcelain
            exit 1
          fi
          echo "Working tree clean: every mutation was restored."
