name: Release

# THIS WORKFLOW PUBLISHES TO MAVEN CENTRAL. Read RELEASING.md before changing it.
#
# A Maven Central release is PERMANENT -- a published version can never be withdrawn or replaced,
# only superseded. Every gate below is deliberate:
#
#   1. Trigger is a PUBLISHED GitHub Release, and nothing else. No push, no tag, no dispatch.
#   2. The job runs in the `maven-central` environment, which carries a required-reviewer rule.
#      A human approves before any step executes.
#   3. The release tag must equal gradle.properties:version, or the job stops.
#   4. Tests run, and the artifacts are staged and uploaded, BEFORE the publish step. The publish
#      step is last in the same job, so it cannot run unless everything above it passed.
#   5. The upload lands in the Central Portal as a DRAFT deployment. The plugin is configured not
#      to auto-release, so the irreversible step is still a human pressing the button at
#      <https://central.sonatype.com/publishing/deployments>.
#
# Maven Central (Sonatype) does NOT support GitHub OIDC trusted publishing the way npm and PyPI
# do, so unlike the other paylod SDKs this one authenticates with long-lived secrets. They live in
# the `maven-central` environment and are listed in RELEASING.md.

on:
  release:
    types: [published]

permissions:
  contents: read
  # id-token: write is NOT requested. Nothing here consumes an OIDC token, because Sonatype
  # cannot accept one. Adding it would imply a trusted-publishing path that does not exist.

jobs:
  build:
    name: Verify, stage, and publish to Maven Central
    runs-on: ubuntu-latest
    environment: maven-central

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Guard against staging 0.5.0 under a v0.4.0 tag. gradle.properties is the single source of
      # truth for the published coordinates (build.gradle.kts reads it rather than restating it),
      # so that is what the tag is checked against.
      - name: Verify release tag matches project version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          project_version=$(grep -E '^version=' gradle.properties | cut -d= -f2- | tr -d '[:space:]')
          tag_version="${RELEASE_TAG#v}"
          echo "release tag:      $RELEASE_TAG (normalised: $tag_version)"
          echo "project version:  $project_version"
          if [ -z "$project_version" ]; then
            echo "::error::Could not read 'version' from gradle.properties." >&2
            exit 1
          fi
          if [ "$tag_version" != "$project_version" ]; then
            echo "::error::Release tag '$RELEASE_TAG' does not match gradle.properties version '$project_version'. Refusing to proceed." >&2
            exit 1
          fi

      - name: Test
        run: ./gradlew test --no-daemon

      # Compiles and runs `check` (which includes the Daraja catalog drift guard). The javadoc jar
      # is NOT produced here: the publishing plugin attaches it to the publication rather than to
      # `assemble`. The staging step below is what builds the complete artifact set.
      - name: Build
        run: ./gradlew build --no-daemon

      # Staged SIGNED, with the same key the Central upload will use. This is the dress rehearsal:
      # if the GPG secrets are wrong, this step fails here -- before anything has been uploaded --
      # rather than at the Portal with the tag already cut. build.gradle.kts makes signing
      # mandatory whenever a key is configured, so an unsignable artifact cannot slip through as
      # an unsigned one.
      - name: Stage signed artifacts to build/repo
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
        run: ./gradlew publishAllPublicationsToLocalStagingRepository --no-daemon

      # Uploaded before the publish step, so that if the Central upload misbehaves the exact bytes
      # that were offered to it are already preserved and inspectable.
      - name: Upload staged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-staging-${{ github.event.release.tag_name }}
          path: build/repo
          if-no-files-found: error

      # Central requires a .asc beside every artifact. Catch a silently-unsigned staging dir here
      # rather than discovering it from a Portal validation error.
      - name: Verify every artifact is signed
        run: |
          missing=0
          while IFS= read -r f; do
            if [ ! -f "$f.asc" ]; then
              echo "::error::missing signature for $f" >&2
              missing=1
            fi
          done < <(find build/repo -type f \
            \( -name '*.jar' -o -name '*.pom' -o -name '*.module' \) ! -name '*.asc')
          if [ "$missing" -ne 0 ]; then
            echo "::error::Refusing to publish: some artifacts are unsigned." >&2
            exit 1
          fi
          echo "All artifacts carry a detached signature."

      # LAST step in the job: everything above it has already passed. Uploads a zipped bundle to
      # the Central Portal Publisher API (this is NOT the old OSSRH nexus-staging API). The plugin
      # does not auto-release, so this creates a DRAFT deployment that a human must then publish
      # at <https://central.sonatype.com/publishing/deployments>.
      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
        run: ./gradlew publishToMavenCentral --no-daemon

      - name: Next step is manual
        run: |
          echo "Uploaded dev.paylod:paylod ${{ github.event.release.tag_name }} to the Central Portal."
          echo "It is a DRAFT deployment. Nothing is public yet."
          echo "Review and release it at https://central.sonatype.com/publishing/deployments"
