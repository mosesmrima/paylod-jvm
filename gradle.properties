# THE source of truth for the published coordinates. `build.gradle.kts` reads these rather than
# restating them: a version held in two files is a version that WILL drift, and it already had —
# this file said 0.4.0 while the build script said 0.5.0, so the number a reader saw depended on
# which file they opened. That is the same duplicated-fact defect that produced four copies of the
# Daraja catalog and the docs drift, in miniature.
group=dev.paylod
version=0.10.0
kotlin.code.style=official
org.gradle.caching=true
org.gradle.parallel=true
